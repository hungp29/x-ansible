---
# HashiCorp Vault
vault_ingress_enabled: true
# Vault must run on a dedicated subdomain — its compiled JS hard-codes /v1/ and
# /ui/ as absolute paths, making sub-path routing (/vault) impossible without
# rewriting the JS bundle.
# Add a DNS A record: vault.momofamily.tplinkdns.com → your server IP.
vault_ingress_host: "vault.momofamily.tplinkdns.com"
