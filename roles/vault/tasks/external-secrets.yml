---
# ── Helm repo ─────────────────────────────────────────────────────────────────
- name: Add External Secrets Helm repo
  ansible.builtin.shell: >
    microk8s helm3 repo add {{ eso_helm_repo_name }} {{ eso_helm_repo_url }}
  register: eso_repo_add
  changed_when: "'already exists' not in eso_repo_add.stdout"
  failed_when: eso_repo_add.rc != 0 and 'already exists' not in eso_repo_add.stdout

- name: Update Helm repos
  ansible.builtin.shell: microk8s helm3 repo update
  changed_when: false

# ── Install / upgrade ESO ─────────────────────────────────────────────────────
- name: Install / upgrade External Secrets Operator via Helm
  ansible.builtin.shell: >
    microk8s helm3 upgrade --install {{ eso_helm_release }}
    {{ eso_helm_repo_name }}/external-secrets
    --namespace {{ eso_namespace }}
    --create-namespace
    {% if eso_chart_version %}--version {{ eso_chart_version }}{% endif %}
    --set installCRDs=true
    --wait
  register: eso_install
  changed_when: "'has been upgraded' in eso_install.stdout or 'has been deployed' in eso_install.stdout"

- name: Wait for External Secrets Operator to be available
  ansible.builtin.shell: >
    microk8s kubectl wait deployment/external-secrets
    -n {{ eso_namespace }}
    --for=condition=available
    --timeout=180s
  ignore_errors: yes
