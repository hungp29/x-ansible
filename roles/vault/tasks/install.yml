---
# ── Helm repo ─────────────────────────────────────────────────────────────────
- name: Add HashiCorp Helm repo
  ansible.builtin.shell: >
    microk8s helm3 repo add {{ vault_helm_repo_name }} {{ vault_helm_repo_url }}
  register: repo_add
  changed_when: "'already exists' not in repo_add.stdout"
  failed_when: repo_add.rc != 0 and 'already exists' not in repo_add.stdout

- name: Update Helm repos
  ansible.builtin.shell: microk8s helm3 repo update
  changed_when: false

# ── Install / upgrade Vault ───────────────────────────────────────────────────
- name: Install / upgrade Vault via Helm
  ansible.builtin.shell: >
    microk8s helm3 upgrade --install {{ vault_helm_release }}
    {{ vault_helm_repo_name }}/vault
    --namespace {{ vault_namespace }}
    --create-namespace
    {% if vault_chart_version %}--version {{ vault_chart_version }}{% endif %}
    --set ui.enabled=true
    --set server.dev.enabled={{ 'true' if vault_dev_mode else 'false' }}
    --wait
  register: vault_install
  changed_when: "'has been upgraded' in vault_install.stdout or 'has been deployed' in vault_install.stdout"

# ── Wait for Vault pod ────────────────────────────────────────────────────────
- name: Wait for vault-0 pod to be running
  ansible.builtin.shell: >
    microk8s kubectl wait pod/vault-0
    -n {{ vault_namespace }}
    --for=condition=Ready
    --timeout=180s
  ignore_errors: yes

# ── Init & unseal (standalone mode only) ──────────────────────────────────────
- name: Skip init/unseal in dev mode
  ansible.builtin.meta: noop
  when: vault_dev_mode | bool

- name: Check if Vault is already initialised
  ansible.builtin.shell: >
    microk8s kubectl exec vault-0 -n {{ vault_namespace }}
    -- vault status -format=json
  register: vault_status_raw
  changed_when: false
  failed_when: false   # exit 2 = sealed (initialised), exit 1 = uninitialised
  when: not vault_dev_mode | bool

- name: Parse Vault status
  ansible.builtin.set_fact:
    vault_status: "{{ vault_status_raw.stdout | from_json }}"
  when:
    - not vault_dev_mode | bool
    - vault_status_raw.stdout | length > 0

- name: Initialise Vault (first boot only)
  ansible.builtin.shell: >
    microk8s kubectl exec vault-0 -n {{ vault_namespace }}
    -- vault operator init
    -key-shares={{ vault_key_shares }}
    -key-threshold={{ vault_key_threshold }}
    -format=json
  register: vault_init_raw
  when:
    - not vault_dev_mode | bool
    - vault_status is defined
    - not vault_status.initialized

- name: Parse Vault init output
  ansible.builtin.set_fact:
    vault_init: "{{ vault_init_raw.stdout | from_json }}"
  when:
    - vault_init_raw is defined
    - vault_init_raw.stdout is defined
    - vault_init_raw.stdout | length > 0

- name: Store unseal keys and root token in a Kubernetes Secret
  ansible.builtin.shell: >
    microk8s kubectl create secret generic {{ vault_init_secret_name }}
    -n {{ vault_namespace }}
    --from-literal=root_token={{ vault_init.root_token }}
    {% for key in vault_init.unseal_keys_b64 %}
    --from-literal=unseal_key_{{ loop.index }}={{ key }}
    {% endfor %}
    --dry-run=client -o yaml | microk8s kubectl apply -f -
  when: vault_init is defined

- name: Unseal Vault with each key
  ansible.builtin.shell: >
    microk8s kubectl exec vault-0 -n {{ vault_namespace }}
    -- vault operator unseal {{ item }}
  loop: "{{ vault_init.unseal_keys_b64 }}"
  when: vault_init is defined

# ── Unseal on restart (already initialised but sealed) ────────────────────────
- name: Fetch existing unseal keys when Vault is sealed but already initialised
  ansible.builtin.shell: >
    microk8s kubectl get secret {{ vault_init_secret_name }}
    -n {{ vault_namespace }}
    -o jsonpath='{.data}'
  register: existing_keys_raw
  changed_when: false
  failed_when: false
  when:
    - not vault_dev_mode | bool
    - vault_status is defined
    - vault_status.initialized
    - vault_status.sealed

- name: Unseal Vault using stored keys
  ansible.builtin.shell: >
    microk8s kubectl exec vault-0 -n {{ vault_namespace }}
    -- vault operator unseal $(
      microk8s kubectl get secret {{ vault_init_secret_name }}
      -n {{ vault_namespace }}
      -o jsonpath='{.data.unseal_key_{{ item }}}'
      | base64 -d
    )
  loop: "{{ range(1, vault_key_shares + 1) | list }}"
  when:
    - not vault_dev_mode | bool
    - vault_status is defined
    - vault_status.initialized
    - vault_status.sealed
